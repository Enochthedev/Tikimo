[build]
builder = "nixpacks"
buildCommand = "pnpm install --filter tiximo && pnpm --filter tiximo build"

[deploy]
startCommand = "pnpm --filter tiximo start"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "tiximo-api"
